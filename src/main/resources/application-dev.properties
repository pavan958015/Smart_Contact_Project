# Google OAuth Credentials
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google_client_secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# GitHub OAuth Credentials
spring.security.oauth2.client.registration.github.client-name=github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github_client_id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github_client_secret}
spring.security.oauth2.client.registration.github.scope=email,profile

# Cloudinary Image Upload Configurations
cloudinary.api.key=${CLOUDINARY_API_KEY:cloudinary_api_key}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:cloudinary_api_secret}
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:cloudinary_cloud_name}

# Email configurations (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mail_username}
spring.mail.password=${MAIL_PASSWORD:mail_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.domain_name=gmail.com

# Development Configurations (No template caching, live reload enabled)
spring.thymeleaf.cache=false
spring.devtools.livereload.enabled=true