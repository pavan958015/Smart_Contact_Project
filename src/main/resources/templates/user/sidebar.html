<aside
  data-th-fragment="sidebar"
  id="logo-sidebar"
  class="fixed top-0 left-0 z-40 w-64 h-screen pt-16 transition-transform -translate-x-full sm:translate-x-0 bg-white dark:bg-gray-950 border-r border-gray-200/50 dark:border-gray-800/50"
  aria-label="Sidebar"
>
  <div
    class="h-full px-4 py-6 overflow-y-auto flex flex-col justify-between"
  >
    <div class="space-y-6">
      <!-- User Profile Summary inside Sidebar -->
      <div class="flex flex-col items-center p-4 bg-emerald-50/30 dark:bg-emerald-950/10 border border-emerald-500/10 rounded-2xl">
        <div class="relative">
          <img
            onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=SCM&background=059669&color=fff';"
            data-th-src="@{${loggedInUser.profilePic}}"
            src="https://ui-avatars.com/api/?name=User&background=059669&color=fff"
            class="h-16 w-16 shadow-md rounded-full object-cover ring-2 ring-emerald-500/30"
            alt="User Profile Pic"
          />
          <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></span>
        </div>

        <h3 class="mt-3 font-extrabold text-sm text-gray-900 dark:text-white text-center line-clamp-1" data-th-text="${loggedInUser.name}">
          User Name
        </h3>
        <span class="text-xs text-gray-450 dark:text-gray-400 font-medium">Welcome Back</span>
      </div>

      <!-- Navigation Menu -->
      <ul class="space-y-1.5 font-semibold text-sm">
        
        <!-- Dashboard Link -->
        <li>
          <a
            data-th-href="@{'/user/dashboard'}"
            class="flex items-center p-3 text-gray-750 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-solid fa-chart-pie text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">Dashboard</span>
          </a>
        </li>
        
        <!-- Profile Link -->
        <li>
          <a
            data-th-href="@{'/user/profile'}"
            class="flex items-center p-3 text-gray-755 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-solid fa-user-gear text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">My Profile</span>
          </a>
        </li>
        
        <!-- Add Contact Link -->
        <li>
          <a
            data-th-href="@{'/user/contacts/add'}"
            class="flex items-center p-3 text-gray-755 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-solid fa-user-plus text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">Add Contact</span>
          </a>
        </li>
        
        <!-- Contacts Link -->
        <li>
          <a
            data-th-href="@{'/user/contacts'}"
            class="flex items-center p-3 text-gray-755 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-regular fa-address-book text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">Contacts Catalog</span>
          </a>
        </li>
        
        <!-- Direct Message -->
        <li>
          <a
            data-th-href="@{'/user/direct-message'}"
            class="flex items-center p-3 text-gray-755 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-solid fa-paper-plane text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">Direct Message</span>
          </a>
        </li>
        
        <!-- Feedback -->
        <li>
          <a
            data-th-href="@{'/user/feedback'}"
            class="flex items-center p-3 text-gray-755 dark:text-gray-300 rounded-xl hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 hover:text-emerald-600 dark:hover:text-emerald-450 transition-all duration-200 group"
          >
            <i class="fa-regular fa-message text-lg text-gray-450 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors w-6"></i>
            <span class="ms-3">Feedback Desk</span>
          </a>
        </li>

      </ul>
    </div>

    <!-- Sidebar Bottom / Logout Action -->
    <div>
      <hr class="border-gray-200/50 dark:border-gray-800/50 my-4" />
      <a
        data-th-href="@{'/do-logout'}"
        class="flex items-center p-3 text-red-600 dark:text-red-400 rounded-xl hover:bg-red-50 dark:hover:bg-red-950/20 transition-all duration-200 font-bold group"
      >
        <i class="fa-solid fa-arrow-right-from-bracket text-lg group-hover:translate-x-0.5 transition-transform w-6"></i>
        <span class="ms-3">Logout Session</span>
      </a>
    </div>

  </div>
</aside>
