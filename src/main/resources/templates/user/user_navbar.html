<nav
  th:fragment="user-navbar"
  class="fixed w-full top-0 left-0 right-0 z-50 backdrop-blur-md bg-white/80 dark:bg-gray-950/80 border-b border-gray-200/50 dark:border-gray-800/50 transition-all duration-300 shadow-sm sm:pl-64"
>
  <div
    class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
  >
    <!-- Sidebar Toggle (Mobile only) -->
    <button
      data-drawer-target="logo-sidebar"
      data-drawer-toggle="logo-sidebar"
      aria-controls="logo-sidebar"
      type="button"
      class="inline-flex items-center p-2 mt-1 ms-1 text-sm text-gray-500 rounded-xl sm:hidden hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-gray-400"
    >
      <span class="sr-only">Open sidebar</span>
      <svg
        class="w-6 h-6"
        aria-hidden="true"
        fill="currentColor"
        viewBox="0 0 20 20"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          clip-rule="evenodd"
          fill-rule="evenodd"
          d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"
        ></path>
      </svg>
    </button>

    <!-- Brand -->
    <a
      data-th-href="@{'/'}"
      class="flex items-center space-x-3 group transition-transform duration-300 hover:scale-105"
    >
      <img
        data-th-src="@{'/images/telephone.png'}"
        class="h-9 shadow-md rounded-full ring-2 ring-emerald-500/20 group-hover:ring-emerald-500/50 transition-all duration-300"
        alt="SCM Logo"
      />
      <span
        class="self-center text-2xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent dark:from-emerald-400 dark:to-teal-300"
      >
        SCM2.0
      </span>
    </a>

    <!-- CTAs and Controls -->
    <div
      class="flex gap-2 md:order-2 items-center space-x-1 md:space-x-2 rtl:space-x-reverse"
    >
      <!-- Dark/Light Theme Button -->
      <button
        id="theme_change_button"
        class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-xl transition duration-300 font-medium text-sm border border-gray-200/50 dark:border-gray-700/50"
      >
        <i class="fa-solid fa-circle-half-stroke text-emerald-500 dark:text-emerald-400"></i>
        <span>Light</span>
      </button>

      <!-- Desktop profile and logout -->
      <a
        data-th-href="@{'/user/profile'}"
        class="hidden md:inline-flex items-center gap-1.5 text-gray-750 hover:text-emerald-600 dark:text-gray-200 dark:hover:text-emerald-450 font-semibold rounded-xl text-sm px-4 py-2.5 transition duration-300 hover:bg-gray-50 dark:hover:bg-gray-900 border border-transparent hover:border-gray-200/30 dark:hover:border-gray-700/30"
      >
        <i class="fa-solid fa-user-circle text-lg text-emerald-500"></i>
        <span data-th-text="${loggedInUser.name}">User</span>
      </a>
      
      <a
        data-th-href="@{'/do-logout'}"
        class="hidden md:inline-flex items-center gap-1.5 text-white bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-600 hover:to-rose-550 focus:ring-4 focus:outline-none focus:ring-red-300 font-semibold rounded-xl text-sm px-5 py-2.5 text-center transition duration-300 shadow-md"
      >
        Logout
      </a>

      <!-- Hamburger Menu for Mobile Link toggle -->
      <button
        data-collapse-toggle="navbar-cta"
        type="button"
        class="inline-flex items-center p-2.5 w-10 h-10 justify-center text-sm text-gray-500 rounded-xl md:hidden hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-gray-400"
        aria-controls="navbar-cta"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="w-5 h-5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 17 14"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M1 1h15M1 7h15M1 13h15"
          />
        </svg>
      </button>
    </div>

    <!-- Menu Links -->
    <div
      class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1 z-50"
      id="navbar-cta"
    >
      <ul
        class="flex flex-col font-semibold p-4 md:p-0 mt-4 border border-gray-100 rounded-2xl bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-transparent dark:bg-gray-900/60 dark:border-gray-800 md:dark:bg-transparent"
      >
        <li>
          <a
            data-th-href="@{'/home'}"
            class="block py-2 px-3 md:p-0 text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 dark:hover:text-emerald-300 transition duration-300"
            aria-current="page"
          >Home</a>
        </li>
        <li>
          <a
            data-th-href="@{'/about'}"
            class="block py-2 px-3 md:p-0 text-gray-700 dark:text-gray-200 hover:text-emerald-600 dark:hover:text-emerald-400 transition duration-300"
          >About</a>
        </li>
        <li>
          <a
            data-th-href="@{'/services'}"
            class="block py-2 px-3 md:p-0 text-gray-700 dark:text-gray-200 hover:text-emerald-600 dark:hover:text-emerald-400 transition duration-300"
          >Services</a>
        </li>
        <li>
          <a
            data-th-href="@{'/contact'}"
            class="block py-2 px-3 md:p-0 text-gray-700 dark:text-gray-200 hover:text-emerald-600 dark:hover:text-emerald-400 transition duration-300"
          >Contact</a>
        </li>

        <!-- Mobile-only items -->
        <li class="md:hidden mt-2 pt-2 border-t border-gray-200/50 dark:border-gray-800/50">
          <a
            data-th-href="@{'/user/profile'}"
            class="block py-2 px-3 text-emerald-600 dark:text-emerald-450 font-bold"
          >
            <span data-th-text="${loggedInUser.name}">User Profile</span>
          </a>
        </li>
        <li class="md:hidden">
          <a
            data-th-href="@{'/do-logout'}"
            class="block py-2 px-3 text-red-600 dark:text-red-400 font-bold"
          >
            Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
